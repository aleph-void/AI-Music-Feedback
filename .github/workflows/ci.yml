name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch/PR so pushes during review
# don't queue up redundant runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Unit and component tests (fast, no display required) ────────────
  unit-tests:
    name: Unit & Component Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit and component tests
        run: npm test

  # ── Job 2: E2E tests (requires build + virtual display for Electron) ───────
  e2e-tests:
    name: E2E Tests (Electron + Playwright)
    runs-on: ubuntu-latest
    # Only run E2E after unit tests pass — no point spending the longer build
    # time if fast tests are already broken.
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies for Electron on Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libgtk-3-0 \
            libgbm1 \
            libasound2t64 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxss1 \
            libxtst6 \
            xvfb

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run E2E tests (with virtual display)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" npm run test:e2e
        env:
          # Disable Electron sandbox — required for containerised CI environments
          # that lack the kernel capabilities needed for the sandbox.
          ELECTRON_DISABLE_SANDBOX: '1'
          # Prevent Electron from opening a real GPU process in headless CI.
          LIBVA_DRIVER_NAME: 'dummy'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/report/
          retention-days: 7
