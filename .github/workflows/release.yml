name: Release

# Runs when a version tag (e.g. v1.2.3) is pushed.
# Tests must pass before any platform build starts.
# Distributable artifacts are attached to a GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create the GitHub Release

jobs:
  # ── 1. Run the full test suite first ────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm test

  # ── 2. Build on each platform (only if tests pass) ────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false   # keep building other platforms even if one fails
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            pack_script: pack:linux

          - platform: linux-arm64
            os: ubuntu-24.04-arm   # GitHub-hosted native ARM64 runner
            pack_script: pack:linux:arm64

          - platform: windows-x64
            os: windows-latest
            pack_script: pack:win

          # No native Windows ARM64 runner exists on GitHub Actions; cross-compile
          # from the x64 runner instead (Electron supports this since v11).
          - platform: windows-arm64
            os: windows-latest
            pack_script: pack:win:arm64

          # macos-latest is arm64 (M-series). Cross-compile x64 from the same
          # runner — Electron supports this since v11, same pattern as win-arm64.
          - platform: mac-arm64
            os: macos-latest
            pack_script: pack:mac

          - platform: mac-x64
            os: macos-latest
            pack_script: pack:mac:x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fakeroot dpkg ruby ruby-dev build-essential
          sudo gem install fpm --no-document

      - run: npm ci

      # ── Stamp package.json with the tag version ───────────────────────────────
      # electron-builder reads the version from package.json, not from the git tag.
      # GITHUB_REF_NAME is the bare tag name (e.g. "v0.0.2"); strip the leading "v"
      # and write it into package.json before the build so the installer filenames,
      # About dialog, and GitHub Release all show the correct version.
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version

      # ── macOS code signing (optional) ────────────────────────────────────────
      # Writes CSC_LINK / CSC_KEY_PASSWORD into $GITHUB_ENV only when the
      # certificate secret is actually configured.  When the secret is absent
      # GitHub resolves it to an empty string; passing that empty string
      # directly as CSC_LINK causes electron-builder to treat the repo root as
      # a certificate file path and fail with "not a file".
      # The shell-level check below avoids setting the var at all when empty,
      # which is the only reliable way to opt out of signing.
      - name: Configure macOS code signing
        if: runner.os == 'macOS'
        env:
          MAC_CERT: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASS: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CERT" ]; then
            echo "CSC_LINK=$MAC_CERT"                                   >> $GITHUB_ENV
            echo "CSC_KEY_PASSWORD=$MAC_CERT_PASS"                      >> $GITHUB_ENV
            echo "CSC_IDENTITY_AUTO_DISCOVERY=true"                     >> $GITHUB_ENV
            [ -n "$APPLE_ID" ] && echo "APPLE_ID=$APPLE_ID"            >> $GITHUB_ENV
            [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && \
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD" >> $GITHUB_ENV
            [ -n "$APPLE_TEAM_ID" ] && echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> $GITHUB_ENV
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false"                    >> $GITHUB_ENV
          fi

      # ── Windows code signing (optional) ──────────────────────────────────────
      # Same pattern: only write the var when the secret is non-empty.
      - name: Configure Windows code signing
        if: runner.os == 'Windows'
        env:
          WIN_CERT: ${{ secrets.WIN_CERT_BASE64 }}
          WIN_CERT_PASS: ${{ secrets.WIN_CERT_PASSWORD }}
        shell: bash
        run: |
          if [ -n "$WIN_CERT" ]; then
            echo "WIN_CSC_LINK=$WIN_CERT"             >> $GITHUB_ENV
            echo "WIN_CSC_KEY_PASSWORD=$WIN_CERT_PASS" >> $GITHUB_ENV
          fi

      - name: Build and package
        run: npm run ${{ matrix.pack_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder bundles an x86 fpm binary; on ARM64 we install fpm
          # natively above and tell electron-builder to use the system one instead.
          USE_SYSTEM_FPM: ${{ matrix.platform == 'linux-arm64' && 'true' || 'false' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          # Collect distributable files only — skip the unpacked directory and
          # builder metadata files.
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
          if-no-files-found: warn
          retention-days: 3

  # ── 3. Create the GitHub Release and attach all artifacts ─────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release/

      - name: List collected artifacts
        run: ls -lh release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          # Auto-generate release notes from merged PRs and commits since last tag.
          generate_release_notes: true
          # Mark as pre-release if the tag contains a pre-release identifier
          # (e.g. v1.0.0-beta.1 → pre-release, v1.0.0 → release).
          prerelease: ${{ contains(github.ref_name, '-') }}
          draft: false
