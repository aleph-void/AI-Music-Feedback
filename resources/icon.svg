<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1e3a"/>
      <stop offset="100%" stop-color="#0d1b36"/>
    </linearGradient>
    <linearGradient id="barTop" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Subtle inner ring -->
  <rect width="1024" height="1024" rx="200" ry="200"
        fill="none" stroke="#6366f1" stroke-width="4" opacity="0.2"/>

  <!-- ─── Waveform bars — centered, spanning most of the icon width ─── -->
  <!-- 7 bars, symmetric, tallest in center. Baseline at y=760 -->
  <!-- bar widths: 56px, gap: 26px, total: 7*56 + 6*26 = 392+156=548, start x=(1024-548)/2=238 -->

  <!-- bar 1 -->
  <rect x="238" y="640" width="56" height="120" rx="28" fill="#6366f1" opacity="0.5"/>
  <!-- bar 2 -->
  <rect x="320" y="552" width="56" height="208" rx="28" fill="#6366f1" opacity="0.7"/>
  <!-- bar 3 -->
  <rect x="402" y="448" width="56" height="312" rx="28" fill="#818cf8" opacity="0.9"/>
  <!-- bar 4 (tallest — center) -->
  <rect x="484" y="368" width="56" height="392" rx="28" fill="#a5b4fc"/>
  <!-- bar 5 -->
  <rect x="566" y="448" width="56" height="312" rx="28" fill="#818cf8" opacity="0.9"/>
  <!-- bar 6 -->
  <rect x="648" y="552" width="56" height="208" rx="28" fill="#6366f1" opacity="0.7"/>
  <!-- bar 7 -->
  <rect x="730" y="640" width="56" height="120" rx="28" fill="#6366f1" opacity="0.5"/>

  <!-- ─── Music note — upper left, white, bold ─── -->
  <!-- Note head: oval rotated slightly -->
  <ellipse cx="258" cy="362" rx="70" ry="52" fill="#e2e8f0" transform="rotate(-18,258,362)"/>
  <!-- Head inner shading -->
  <ellipse cx="262" cy="358" rx="40" ry="29" fill="#6366f1" transform="rotate(-18,262,358)" opacity="0.5"/>
  <!-- Stem -->
  <rect x="318" y="148" width="24" height="222" rx="12" fill="#e2e8f0"/>
  <!-- Flag 1 -->
  <path d="M342 148 Q450 194 432 275 Q390 228 342 245 Z" fill="#e2e8f0"/>
  <!-- Flag 2 -->
  <path d="M342 218 Q450 264 430 345 Q390 298 342 316 Z" fill="#e2e8f0"/>

  <!-- ─── Sound arc (upper right) — suggests "broadcast/streaming" ─── -->
  <path d="M 660 200 A 90 90 0 0 1 780 200"  stroke="#6366f1" stroke-width="28" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 628 150 A 150 150 0 0 1 812 150" stroke="#6366f1" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M 596 96  A 210 210 0 0 1 844 96"  stroke="#6366f1" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.25"/>

  <!-- ─── Green "live" dot at arc center ─── -->
  <circle cx="720" cy="248" r="30" fill="#22c55e" opacity="0.95"/>
  <circle cx="720" cy="248" r="16" fill="#86efac"/>
</svg>
